<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cash App UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      height: 100%;
    }

    body {
      background: #1a1a1a;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      height: min(844px, 100svh);
      height: min(844px, 100dvh);
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100svh;
      max-height: 100dvh;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.85);
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      min-height: 0;
    }
    .screen.active { display: flex; }

    /* ─── EDITABLE AVATAR WRAPPER ────────────────────────── */
    .av-wrap {
      position: relative;
      display: inline-flex;
      cursor: pointer;
      flex-shrink: 0;
    }
    .av-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      pointer-events: none;
    }
    .av-wrap .av-cam {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }
    .av-cam svg { filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }

    /* ─── PAY SCREEN ─────────────────────────────────────── */
    #pay-screen { background: #00C72C; }

    .pay-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 48px 20px 8px;
    }

    .qr-icon {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 24px;
      height: 24px;
    }
    .qr-icon span { width: 10px; height: 10px; background: #000; border-radius: 2px; }
    .qr-icon span:last-child { background: transparent; border: 2px solid #000; border-radius: 2px; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .search-btn-green {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .search-btn-green svg { display: block; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(0,0,0,0.2);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 94% 24%;
    }

    .amount-display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .amount-display span {
      font-size: clamp(64px, 18vw, 88px);
      font-weight: 900;
      color: #000;
      letter-spacing: -2px;
      line-height: 1;
      user-select: none;
    }
    .amount-display span.small { font-size: 56px; }

    .numpad { padding: 0 24px 8px; }
    .numpad-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .num-btn {
      width: 33.33%;
      height: 72px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 600;
      color: #000;
      border-radius: 12px;
      transition: opacity 0.1s;
    }
    .num-btn:active { opacity: 0.5; transform: scale(0.95); }
    .num-btn.dot { font-size: 20px; line-height: 1; }

    .pay-actions {
      padding: 0 16px 8px;
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 9999px;
      background: rgba(0,100,20,0.35);
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #000;
      transition: opacity 0.15s;
    }
    .action-btn:active { opacity: 0.7; }

    .pay-btn-wrap { padding: 0 16px 8px; }
    .pay-btn {
      width: 100%;
      padding: 17px;
      border-radius: 9999px;
      background: #000;
      border: none;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      transition: opacity 0.15s;
    }
    .pay-btn:active { opacity: 0.75; }

    /* ─── BOTTOM NAV ─────────────────────────────────────── */
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 12px 24px 16px;
    }
    .nav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
    }
    .nav-balance-pill {
      padding: 10px 18px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
    }
    .nav-balance-text { font-size: 14px; font-weight: 500; }
    .nav-dollar-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-clock-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pay-screen .bottom-nav { background: transparent; }
    #pay-screen .nav-balance-text { color: rgba(0,80,10,0.75); }
    #pay-screen .nav-dollar-circle { background: rgba(0,100,20,0.45); }
    #pay-screen .nav-clock-circle { border: 1.5px solid rgba(0,80,10,0.6); }

    #money-screen .bottom-nav,
    #activity-screen .bottom-nav { background: #0f0f0f; }

    /* ─── DARK SCREENS COMMON ────────────────────────────── */
    #money-screen,
    #activity-screen { background: #0f0f0f; }

    .dark-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 48px 20px 16px;
    }
    .screen-title { font-size: 22px; font-weight: 700; color: #fff; }
    .dark-topbar-right { display: flex; align-items: center; gap: 12px; }

    .search-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1e1e1e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-dark-wrap {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .avatar-dark-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 94% 24%;
    }

    /* ─── MONEY SCREEN ───────────────────────────────────── */
    .money-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 8px;
      scrollbar-width: none;
    }
    .money-scroll::-webkit-scrollbar { display: none; }

    .card {
      background: #1a1a1a;
      border-radius: 16px;
      margin-bottom: 12px;
    }
    .shipped-card {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .shipped-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 9999px;
    }
    .shipped-badge span { font-size: 12px; color: #fff; font-weight: 500; }
    .cashtag { font-size: 15px; font-weight: 600; color: #fff; }

    .balance-card { padding: 20px 20px 24px; }
    .balance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .balance-label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .balance-label { font-size: 14px; color: #888; font-weight: 500; }
    .balance-dots { font-size: 14px; color: #888; }
    .eye-btn { background: transparent; border: none; cursor: pointer; }
    .balance-amount { font-size: 42px; font-weight: 700; color: #fff; margin-bottom: 28px; letter-spacing: -1px; }
    .balance-actions { display: flex; gap: 12px; }
    .balance-action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 9999px;
      background: #2a2a2a;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      transition: opacity 0.15s;
    }
    .balance-action-btn:active { opacity: 0.7; }

    .green-card {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .green-card-left { display: flex; align-items: center; gap: 12px; }
    .green-phone-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #00C72C;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .green-card-label { font-size: 16px; color: #fff; font-weight: 500; }
    .earn-status { font-size: 14px; color: #888; }

    .btc-card { padding: 20px; }
    .btc-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .btc-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .btc-amount { font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .btc-today { font-size: 13px; color: #555; margin-top: 4px; }
    .btc-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid #00C72C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #00C72C;
      flex-shrink: 0;
    }

    .family-card { padding: 16px 20px; }
    .family-label { font-size: 13px; color: #888; margin-bottom: 8px; }
    .family-row { display: flex; align-items: center; gap: 12px; }
    .family-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .family-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 7% 67%;
    }
    .family-name { font-size: 18px; font-weight: 600; color: #fff; }

    .more-section { margin-bottom: 12px; }
    .more-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .taxes-card { padding: 16px 20px; }
    .taxes-label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .taxes-text { font-size: 15px; color: #fff; font-weight: 500; }

    /* ─── ACTIVITY SCREEN ────────────────────────────────── */
    .contacts-row {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding: 0 20px 16px;
      scrollbar-width: none;
    }
    .contacts-row::-webkit-scrollbar { display: none; }

    .contact-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .contact-bubble {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #000;
      overflow: hidden;
    }
    .contact-bubble.add-bubble {
      background: transparent;
      border: 2px solid #3a3a3a;
      color: #fff;
    }
    .contact-bubble img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .contact-name { font-size: 12px; color: #888; }

    .activity-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
      scrollbar-width: none;
    }
    .activity-scroll::-webkit-scrollbar { display: none; }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      margin-top: 8px;
    }

    .tx-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
    }

    .tx-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      overflow: hidden;
    }
    .tx-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tx-info { flex: 1; min-width: 0; }
    .tx-name { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.3; }
    .tx-note { font-size: 13px; color: #555; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-date { font-size: 11px; color: #444; margin-top: 2px; }
    .tx-amount { font-size: 15px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .tx-amount.positive { color: #00C72C; }

    .review-btn {
      padding: 8px 16px;
      border-radius: 9999px;
      background: #2a2a2a;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .review-btn:active { opacity: 0.7; }

    .repay-btn {
      padding: 8px 14px;
      border-radius: 9999px;
      background: #2a2a2a;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .repay-btn:active { opacity: 0.7; }
    @media (max-width: 480px), (max-height: 820px) {
      body {
        align-items: stretch;
        justify-content: stretch;
        background: #000;
      }

      .phone {
        width: 100vw;
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        max-width: 100vw;
        max-height: 100vh;
        max-height: 100svh;
        max-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }

      .pay-topbar,
      .dark-topbar {
        padding-top: calc(env(safe-area-inset-top) + 14px);
        padding-left: 16px;
        padding-right: 16px;
      }

      .pay-topbar { padding-bottom: 4px; }
      .dark-topbar { padding-bottom: 12px; }

      .amount-display span {
        font-size: clamp(58px, 20vw, 82px);
      }

      .numpad {
        padding: 0 16px 6px;
      }

      .numpad-row {
        margin-bottom: 2px;
      }

      .num-btn {
        height: min(64px, 8.5vh);
        font-size: clamp(26px, 9vw, 32px);
      }

      .pay-actions {
        padding: 0 16px 8px;
        gap: 10px;
      }

      .action-btn,
      .pay-btn {
        min-height: 52px;
      }

      .pay-btn-wrap {
        padding: 0 16px 8px;
      }

      .bottom-nav {
        padding: 10px 20px calc(env(safe-area-inset-bottom) + 10px);
      }

      .money-scroll,
      .activity-scroll {
        padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
      }

      .contacts-row {
        padding-bottom: 12px;
      }
    }

    @media (max-height: 740px) {
      .pay-topbar,
      .dark-topbar {
        padding-top: calc(env(safe-area-inset-top) + 10px);
      }

      .amount-display span {
        font-size: clamp(52px, 18vw, 72px);
      }

      .num-btn {
        height: 56px;
      }
    }
  </style>
</head>
<body>

<input type="file" id="avatar-upload" accept="image/*" style="display:none;" />

<div class="phone">

  <!-- ═══════════════════════════════════════════════════════
       PAY SCREEN
  ════════════════════════════════════════════════════════ -->
  <div class="screen active" id="pay-screen">

    <div class="pay-topbar">
      <button style="background:none;border:none;cursor:pointer;padding:4px;">
        <div class="qr-icon">
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </button>
      <div class="topbar-right">
        <button class="search-btn-green">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="av-wrap" onclick="editAvatar(this)">
          <div class="avatar">
            <img data-img="pay_topbar_avatar" src="images/profilepng.png" alt="profile" />
          </div>
          <div class="av-cam"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
        </div>
      </div>
    </div>

    <div class="amount-display">
      <span id="pay-amount">$0</span>
    </div>

    <div class="numpad">
      <div class="numpad-row">
        <button class="num-btn" onclick="numPress('1')">1</button>
        <button class="num-btn" onclick="numPress('2')">2</button>
        <button class="num-btn" onclick="numPress('3')">3</button>
      </div>
      <div class="numpad-row">
        <button class="num-btn" onclick="numPress('4')">4</button>
        <button class="num-btn" onclick="numPress('5')">5</button>
        <button class="num-btn" onclick="numPress('6')">6</button>
      </div>
      <div class="numpad-row">
        <button class="num-btn" onclick="numPress('7')">7</button>
        <button class="num-btn" onclick="numPress('8')">8</button>
        <button class="num-btn" onclick="numPress('9')">9</button>
      </div>
      <div class="numpad-row">
        <button class="num-btn dot" onclick="numPress('.')">•</button>
        <button class="num-btn" onclick="numPress('0')">0</button>
        <button class="num-btn" onclick="numPress('back')">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="pay-actions">
      <button class="action-btn">Pool</button>
      <button class="action-btn">Request</button>
    </div>

    <div class="pay-btn-wrap">
      <button class="pay-btn">Pay</button>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" onclick="switchTab('money')">
        <span class="nav-balance-text">$315</span>
      </button>
      <button class="nav-btn" onclick="switchTab('pay')">
        <div class="nav-dollar-circle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00D632" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
      </button>
      <button class="nav-btn" onclick="switchTab('activity')">
        <div class="nav-clock-circle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(0,80,10,0.75)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MONEY SCREEN
  ════════════════════════════════════════════════════════ -->
  <div class="screen" id="money-screen">

    <div class="dark-topbar">
      <span class="screen-title">Money</span>
      <div class="dark-topbar-right">
        <button class="search-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <div class="av-wrap" onclick="editAvatar(this)">
          <div class="avatar-dark-wrap">
            <img data-img="money_topbar_avatar" src="images/profilepng.png.png" alt="profile" />
          </div>
          <div class="av-cam"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
        </div>
      </div>
    </div>

    <div class="money-scroll">

      <div class="card shipped-card">
        <div class="shipped-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span>Shipped</span>
        </div>
        <span class="cashtag">$lbyc69Style</span>
      </div>

      <div class="card balance-card">
        <div class="balance-header">
          <button class="balance-label-row">
            <span class="balance-label">Cash balance</span>

          <div class="av-cam"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>

</div>

<script>
  /* ─── EASY EDIT SECTION ───────────────────────────────────
     Every avatar here has its OWN key.
     Editing one will NOT change any other avatar.

     Static avatars:
       pay_topbar_avatar
       money_topbar_avatar
       activity_topbar_avatar
       family_avatar

     Contact avatars:
       contact_damitri
       contact_marco
       contact_tiffany
       contact_mariana
       contact_e

     Activity avatars:
       tx_damitri_1
       tx_device_login
       tx_marco_1
       tx_tiffany_1
       tx_mariana_1
       tx_marco_2
       tx_e_1
  */
  const STATIC_AVATARS = {
    pay_topbar_avatar: {
      photo: 'images/profilepng.png',
      photoPosition: 'center'
    },
    money_topbar_avatar: {
      photo: 'images/profilepng.png.png',
      photoPosition: 'center'
    },
    activity_topbar_avatar: {
      photo: 'images/Lady.png',
      photoPosition: '94% 24%'
    },
    family_avatar: {
      photo: 'images/Lady.png',
      photoPosition: '7% 67%'
    }
  };

  const FAMILY_SECTION = {
    label: 'Last active Aug 2024'
  };

  const CONTACTS = [
    {
      key: 'contact_damitri',
      name: 'Freecash',
      photo: 'images/Freecash.png',
      bg: '#E8622A',
      photoPosition: 'center'
    },
    {
      key: 'contact_marco',
      name: 'Marco',
      photo: 'images/Lady.png',
      bg: '#00B89C',
      photoPosition: 'center'
    },
    {
      key: 'contact_tiffany',
      name: 'Tiffany',
      photo: 'images/Lady.png',
      bg: '#555',
      photoPosition: '65% 68%'
    },
    {
      key: 'contact_mariana',
      name: 'Mariana',
      photo: 'images/Lady.png',
      bg: '#E8622A',
      photoPosition: 'center'
    },
    {
      key: 'contact_e',
      name: 'E',
      photo: 'images/Lady.png',
      bg: '#8B7A2A',
      photoPosition: 'center'
    }
  ];

  const ACTIVITY_ROWS = [
    {
      key: 'tx_damitri_1',
      name: 'Damitri Perdue',
      photo: 'images/Lady.png',
      bg: '#E8622A',
      photoPosition: 'center',
      note: '...',
      date: 'Apr 5',
      amount: '+$300',
      amountClass: 'positive'
    },
    {
      key: 'tx_device_login',
      name: 'New device login',
      photo: 'images/Lady.png',
      bg: '#E84040',
      photoPosition: 'center',
      alt: 'device',
      note: 'Verification needed',
      date: 'Mar 29 at 12:26 PM',
      amount: '$20'
    },
    {
      key: 'tx_marco_1',
      name: 'Marco Amaya',
      photo: 'images/Lady.png',
      bg: '#00B89C',
      photoPosition: 'center',
      note: 'you bettern not be lying nigga 🙂',
      date: 'Mar 29 · Replied ❤️',
      amount: '$20'
    },
    {
      key: 'tx_tiffany_1',
      name: 'Tiffany vargas',
      photo: 'images/Lady.png',
      bg: '#555',
      photoPosition: '65% 68%',
      note: 'Pay over time available',
      date: 'Mar 18 · Amen.',
      repay: '$20'
    },
    {
      key: 'tx_mariana_1',
      name: 'Mariana Govea',
      photo: 'images/Lady.png',
      bg: '#E8622A',
      photoPosition: 'center',
      note: 'tip',
      date: 'Mar 8',
      amount: '$20'
    },
    {
      key: 'tx_marco_2',
      name: 'Marco Amaya',
      photo: 'images/Lady.png',
      bg: '#00B89C',
      photoPosition: 'center',
      note: 'AFFILIATE COMMISSIONS',
      date: 'Mar 3',
      amount: '$250'
    },
    {
      key: 'tx_e_1',
      name: 'E...',
      photo: 'images/Lady.png',
      bg: '#8B7A2A',
      photoPosition: 'center',
      note: 'P...',
      date: 'Mar...',
      amount: '$45.16',
      rowStyle: 'opacity:0.5;'
    }
  ];

  const CAMERA_ICON_16 = `
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
      <circle cx="12" cy="13" r="4"></circle>
    </svg>
  `;

  const CAMERA_ICON_14 = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
      <circle cx="12" cy="13" r="4"></circle>
    </svg>
  `;

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function avatarEntry(key) {
    return STATIC_AVATARS[key]
      || CONTACTS.find((item) => item.key === key)
      || ACTIVITY_ROWS.find((item) => item.key === key)
      || null;
  }

  function imageMarkup(item, className, iconMarkup, altOverride = '') {
    const altText = altOverride || item.alt || item.name || item.key;
    return `
      <div class="av-wrap" data-person="${escapeHtml(item.key)}" onclick="editAvatar(this)">
        <div class="${className}" style="background:${escapeHtml(item.bg || '#2a2a2a')};overflow:hidden;">
          <img data-img="${escapeHtml(item.key)}" src="${escapeHtml(item.photo || '')}" alt="${escapeHtml(altText)}" style="width:100%;height:100%;object-fit:cover;object-position:${escapeHtml(item.photoPosition || 'center')};display:block;" />
        </div>
        <div class="av-cam">${iconMarkup}</div>
      </div>
    `;
  }

  function renderContacts() {
    const row = document.getElementById('contacts-row');
    if (!row) return;

    const addTile = `
      <div class="contact-item">
        <div class="contact-bubble add-bubble">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </div>
        <span class="contact-name">Get $25</span>
      </div>
    `;

    const contactTiles = CONTACTS.map((item) => {
      return `
        <div class="contact-item">
          ${imageMarkup(item, 'contact-bubble', CAMERA_ICON_16)}
          <span class="contact-name">${escapeHtml(item.name || item.key)}</span>
        </div>
      `;
    }).join('');

    row.innerHTML = addTile + contactTiles;
  }

  function renderTransactionAction(item) {
    if (item.repay) {
      return `
        <button class="repay-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"></polyline>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
            <polyline points="7 23 3 19 7 15"></polyline>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
          </svg>
          ${escapeHtml(item.repay)}
        </button>
      `;
    }

    const amountClass = item.amountClass ? `tx-amount ${item.amountClass}` : 'tx-amount';
    return `<span class="${escapeHtml(amountClass)}">${escapeHtml(item.amount || '')}</span>`;
  }

  function renderTransactions() {
    const list = document.getElementById('activity-list');
    if (!list) return;

    list.innerHTML = ACTIVITY_ROWS.map((item) => {
      return `
        <div class="tx-row" style="${escapeHtml(item.rowStyle || '')}">
          ${imageMarkup(item, 'tx-avatar', CAMERA_ICON_14, item.alt)}
          <div class="tx-info">
            <div class="tx-name">${escapeHtml(item.name || item.key)}</div>
            <div class="tx-note">${escapeHtml(item.note || '')}</div>
            <div class="tx-date">${escapeHtml(item.date || '')}</div>
          </div>
          ${renderTransactionAction(item)}
        </div>
      `;
    }).join('');
  }

  function applyImages() {
    document.querySelectorAll('[data-img]').forEach((el) => {
      const key = el.getAttribute('data-img');
      const item = avatarEntry(key);
      if (!item?.photo) return;
      el.src = item.photo;
      el.style.objectPosition = item.photoPosition || 'center';
    });

    const familyLabel = document.querySelector('.family-name');
    if (familyLabel && FAMILY_SECTION.label) {
      familyLabel.textContent = FAMILY_SECTION.label;
    }
  }

  function renderEditableAvatars() {
    renderContacts();
    renderTransactions();
    applyImages();
  }

  let amount = '0';
  let hasDecimal = false;

  function updateDisplay() {
    const el = document.getElementById('pay-amount');
    const display = '$' + amount;
    el.textContent = display;
    el.className = display.length > 8 ? 'small' : '';
  }

  function numPress(key) {
    if (key === 'back') {
      if (amount.length <= 1) {
        amount = '0';
        hasDecimal = false;
      } else {
        amount = amount.slice(0, -1);
        if (!amount.includes('.')) hasDecimal = false;
      }
    } else if (key === '.') {
      if (hasDecimal) return;
      hasDecimal = true;
      amount += '.';
    } else {
      if (hasDecimal) {
        const parts = amount.split('.');
        if (parts[1] && parts[1].length >= 2) return;
      }
      if (amount === '0') {
        amount = key;
      } else {
        amount += key;
      }
    }
    updateDisplay();
  }

  function switchTab(tab) {
    document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
    document.getElementById(tab + '-screen').classList.add('active');
  }

  let balanceVisible = true;
  function toggleBalance() {
    balanceVisible = !balanceVisible;
    document.getElementById('balance-display').textContent = balanceVisible ? '$315.00' : '••••••';
  }

  let activeImageKey = null;

  function editAvatar(wrap) {
    activeImageKey = wrap?.dataset.person || wrap?.querySelector('[data-img]')?.getAttribute('data-img') || null;
    if (!activeImageKey) return;

    const upload = document.getElementById('avatar-upload');
    upload.value = '';
    upload.click();
  }

  document.getElementById('avatar-upload').addEventListener('change', function () {
    const file = this.files[0];
    if (!file || !activeImageKey) return;

    const entry = avatarEntry(activeImageKey);
    if (!entry) return;

    const reader = new FileReader();
    reader.onload = function (e) {
      entry.photo = e.target.result;
      entry.photoPosition = 'center';
      renderEditableAvatars();
    };
    reader.readAsDataURL(file);
  });

  document.addEventListener('DOMContentLoaded', renderEditableAvatars);
</script>

</body>
</html>
