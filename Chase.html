<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile Static Image</title>
  <style>
    :root {
      --device-max-width: 430px;
      --desktop-bg: #eef2f8;
      --frame-radius: 28px;
      --desktop-shadow: 0 20px 60px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .screen {
      width: 100%;
      max-width: var(--device-max-width);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-right: env(safe-area-inset-right, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      background: #ffffff;
    }

    .screen img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    @media (min-width: 431px) {
      html,
      body {
        background: linear-gradient(180deg, #f7f9fc 0%, var(--desktop-bg) 100%);
      }

      body {
        padding: 24px 16px;
      }

      .screen {
        min-height: auto;
        border-radius: var(--frame-radius);
        overflow: hidden;
        box-shadow: var(--desktop-shadow);
      }
    }

    @media (max-width: 430px) {
      .screen {
        max-width: 100vw;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Static banking app screenshot">
    <!-- Change the image below anytime by replacing the file in /images/ or editing the src path -->
    <img src="images/Waldo.png" alt="Static banking app screen" />
  </main>
</body>
</html>
