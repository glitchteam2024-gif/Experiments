  var countryToLang = {
    AU:'en', US:'en', GB:'en', CA:'en',
    AT:'de', DE:'de', CH:'de',
    FR:'fr', BE:'fr',
    IT:'it',
    NL:'nl',
    JP:'ja',
    KR:'kr',
    PL:'pl',
    SE:'sv'
  };

  function detectLanguage() {
    var params = new URLSearchParams(window.location.search);
    var lp = params.get('lang');
    if (lp && translations[lp]) return lp;
    var cp = params.get('country');
    if (cp) { var m = countryToLang[cp.toUpperCase()]; if (m && translations[m]) return m; }
    var bl = (navigator.language || navigator.userLanguage || 'en');
    var short = bl.split('-')[0].toLowerCase();
    if (translations[short]) return short;
    var rm = bl.toUpperCase().match(/-([A-Z]{2})$/);
    if (rm) { var m2 = countryToLang[rm[1]]; if (m2 && translations[m2]) return m2; }
    return 'en';
  }

  var currentLang = detectLanguage();
  var t = translations[currentLang] || translations['en'];
  document.documentElement.lang = currentLang;

  <script type="module">

    // State management
    let scrollToggle = true;

    function toggleScroll() {
      scrollToggle = !scrollToggle;
      render();
    }

    function render() {
      const root = document.getElementById('root');
      const t = window.t;

        <div class="max-w-md mx-auto min-h-screen bg-[#0c0c14] relative">

                src="images/freecash-logo.png"
                alt="Freecash"
                class="w-14 h-14 object-cover rounded-2xl"
              />
              <span class="text-white font-bold text-lg">FREECASH</span>
            </div>
            <button class="text-[#8a8f9e] hover:text-[#a0a5b4] transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
              </svg>
            </button>
          </div>

          <!-- Main Content -->
          <div class="px-4 pt-6 pb-24">
            <!-- Balance Card -->
            <div class="bg-gradient-to-br from-[#00ff88]/10 to-[#00ff88]/5 border border-[#00ff88]/20 rounded-2xl p-6 mb-4" style="box-shadow: 0 0 30px rgba(255,215,0,0.08);">
              <div class="flex items-start justify-between">
                <div>
                  <p class="text-[#8a8f9e] text-sm mb-2">${t.availableBalance}</p>
                  <p class="font-black" style="font-size: 56px; line-height: 1; background: linear-gradient(135deg, #ffd700, #ffb800, #e6a800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(255,215,0,0.35)) drop-shadow(0 0 40px rgba(255,184,0,0.15));">${t.balanceAmount}</p>
                </div>
              </div>
            </div>

            <!-- Settings Section -->
            <div class="mb-6">
              <h3 class="text-xs text-[#8a8f9e] tracking-wider mb-3 uppercase">${t.settings}</h3>
              <div class="rounded-2xl p-5 flex items-center justify-between transition-all" style="background: ${scrollToggle ? '#0a1f14' : '#12121e'}; border: 1px solid ${scrollToggle ? 'rgba(0,255,136,0.3)' : '#1a1a27'}; box-shadow: ${scrollToggle ? '0 0 25px rgba(0,255,136,0.15), inset 0 0 30px rgba(0,255,136,0.05)' : '0 0 20px rgba(0,255,136,0.08)'};">
                <div class="flex items-center gap-4">
                  <div class="w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0" style="background: #0a2a1a; border: 1px solid rgba(0,255,136,0.3);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                  </div>
                  <div>
                    <span class="text-lg font-bold text-[#f0f6ff] block">${t.getPaidScrolling}</span>
                    <span class="text-xs" style="color: ${scrollToggle ? '#00ff88' : '#8a8f9e'};">${t.currentRate} <span class="font-semibold">${t.rateAmount}</span></span>
                  </div>
                </div>
                <button
                  onclick="window.toggleScroll()"
                  class="relative w-14 h-8 rounded-full transition-all flex-shrink-0 ${scrollToggle ? 'bg-[#00ff88]' : 'bg-[#2a2a3d]'}"
                  style="${scrollToggle ? 'box-shadow: 0 0 12px rgba(0,255,136,0.4);' : ''}"
                >
                  <div class="absolute top-1 ${scrollToggle ? 'right-1' : 'left-1'} w-6 h-6 bg-white rounded-full transition-all shadow-md"></div>
                </button>
              </div>
            </div>

            <!-- Hours Scrolled Section -->
            <div class="bg-[#12121e] border border-[#1a1a27] rounded-2xl p-4 mb-8 flex items-center justify-between">
              <span class="text-sm text-[#8a8f9e]">${t.hoursScrolled}</span>
              <span class="text-lg font-bold text-[#00ff88]">${t.hoursAmount}</span>
            </div>

            <!-- Recent Activity -->
            <div class="mb-6">
              <h3 class="text-xs text-[#8a8f9e] tracking-wider mb-3 uppercase">${t.recentActivity}</h3>
              <div class="space-y-2">
                ${[
                  { amount: t.activity1Amount, desc: t.videoWatched, time: t.activity1Time },
                  { amount: t.activity2Amount, desc: t.videoWatched, time: t.activity2Time },
                  { amount: t.activity3Amount, desc: t.surveyCompleted, time: t.activity3Time }
                ].map(activity => `
                  <div class="bg-[#12121e] border border-[#1a1a27] rounded-xl p-4 flex items-center justify-between hover:border-[#2a2a3d] transition-colors">
                    <div>
                      <p class="text-[#f0f6ff] text-sm font-medium">${activity.desc}</p>
                      <p class="text-[#8a8f9e] text-xs mt-1">${activity.time}</p>
                    </div>
                    <p class="text-[#00ff88] font-bold">${activity.amount}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          <!-- Bottom Navigation -->
          <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#12121e] border-t border-[#1a1a27] px-4 py-3">
            <div class="flex items-center justify-around">
              ${[
                { icon: 'home', label: t.navHome, active: true },
                { icon: 'dollar-sign', label: t.navEarn, active: false },
                { icon: 'gift', label: t.navRewards, active: false },
                { icon: 'user', label: t.navProfile, active: false }
              ].map(item => `
                <button class="flex flex-col items-center gap-1 ${item.active ? 'text-[#00ff88]' : 'text-[#8a8f9e]'} hover:text-[#00ff88] transition-colors">
                  ${getIcon(item.icon)}
                  <span class="text-xs">${item.label}</span>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function getIcon(name) {
      const icons = {
        'home': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
        'dollar-sign': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
        'gift': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>',
        'user': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
      };
      return icons[name] || '';
    }

    // Make toggleScroll available globally
    window.toggleScroll = toggleScroll;

    // Initial render
    render();
  </script>
